<style>
  :root {
    --wine:        #6B1A30;
    --wine-dark:   #3E0D1C;
    --gold:        #C9963A;
    --cream:       #FBF6EE;
    --z16-bg:      #E8EEF8;
    --z16-txt:     #1A3566;
    --z16-badge:   #2C4E9A;
    --zct-bg:      #E8F5EC;
    --zct-txt:     #1B5E2E;
    --zct-badge:   #2E7D45;
    --zka-bg:      #F5EDE2;
    --zka-txt:     #5A3210;
    --zka-badge:   #8B4E18;
    --zor-bg:      #FFF0E0;
    --zor-txt:     #7A3D00;
    --zor-badge:   #C06010;
    --zhost-bg:    #F3E8F8;
    --zhost-txt:   #4A1A6B;
    --zhost-badge: #7B3FA0;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    background: var(--cream);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  header {
    background: var(--wine-dark);
    padding: 18px 20px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 3px 16px rgba(0,0,0,0.35);
  }
  .logo-wrap { display:flex; flex-direction:column; gap:2px; }
  .logo-name {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--gold);
    font-weight: 900;
    letter-spacing: 0.5px;
    line-height: 1;
  }
  .logo-sub {
    font-size: 10px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 600;
  }
  .period-tag {
    background: var(--gold);
    color: var(--wine-dark);
    font-size: 12px;
    font-weight: 800;
    padding: 6px 14px;
    border-radius: 20px;
  }

  .legend {
    display: flex;
    gap: 7px;
    padding: 10px 16px;
    background: var(--wine-dark);
    border-bottom: 2px solid rgba(201,150,58,0.35);
    flex-wrap: wrap;
    justify-content: center;
  }
  .leg {
    display: flex; align-items: center; gap: 5px;
    font-size: 10px; color: #fff; font-weight: 700;
    background: rgba(255,255,255,0.08);
    padding: 3px 9px; border-radius: 20px;
  }
  .leg-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }

  .tabs-wrap {
    position: sticky;
    top: 86px;
    z-index: 90;
    background: var(--cream);
    border-bottom: 2px solid rgba(107,26,48,0.15);
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .tabs {
    display: flex;
    overflow-x: auto;

const weekends = ["Сб","Вс"];

function initials(name) {
  const parts = name.trim().split(/\s+/);
  if (parts.length === 1) return parts[0].slice(0,2).toUpperCase();
  return (parts[0][0] + parts[1][0]).toUpperCase();
}

const tabsEl   = document.getElementById('tabs');
const contentEl= document.getElementById('content');

  const info  = data[d];
  const isWE  = weekends.includes(info.name);
  const isFirst = i === 0;

  const tab = document.createElement('div');
  tab.className = 'tab' + (isWE?' weekend':'') + (isFirst?' active':'');
  tab.dataset.day = d;
  tab.innerHTML = `<div class="tab-num">${d}</div><div class="tab-day">${info.name}</div>`;
  tab.addEventListener('click', () => switchDay(+d));

  panel.innerHTML = buildPanel(+d);

  const info = data[d];

      }
    </div>`;

  // zones

    const people = info.zones[zn.key];
    if (!people || !people.length) return '';

    return `<div class="zone-card ${zn.cls}">
      <div class="zone-header">
        <span class="zone-icon">${zn.icon}</span>
        <span class="zone-name">${zn.label}</span>
        <span class="zone-pcount">${people.length} чел.</span>
      </div>
      ${people.map(s => {
        // check if this person also works double zone (9 мая Алексей)
        const isDouble = (d === 9 && s.n === 'Алексей' && zn.key === 'zka');

        <div class="person-row">
          <div class="person-avatar">${initials(s.n)}</div>
          <div class="person-info">
            <div class="person-name">${s.n}${isDouble ? '<span class="double-badge">2 зоны</span>' : ''}</div>
            <div class="person-time">начало смены</div>
          </div>
          <div class="time-badge">${s.t}</div>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');

  return `
    <div class="day-hero">
      <div class="hero-top">
        <div class="hero-date-wrap">
          <div class="hero-date">${d}</div>
          <div class="hero-dayname">${info.name}</div>
        </div>
        <div class="hero-count">👥 ${n} чел.</div>
      </div>
      ${infoRow}
    </div>
    ${zonesHtml}
    <footer>Вино &amp; Хинкали · Май ${d}</footer>
  `;
}

function switchDay(d) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', +t.dataset.day === d));
  document.querySelectorAll('.day-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-'+d).classList.add('active');
  document.querySelector(`.tab[data-day="${d}"]`).scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
}
</script>
</body>
</html>
